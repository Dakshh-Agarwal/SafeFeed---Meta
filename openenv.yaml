version: "1.0"
name: safefeed
description: "SafeFeed: An OpenEnv-compatible benchmark environment for evaluating safety-aware feed ranking agents against engagement vs. safety trade-offs in social media feeds."
type: environment
entry_point: inference.py

tasks:
  - id: "balanced_feed"
    name: "Balanced Feed"
    description: "A balanced session with moderate-risk and diverse content. Tests baseline agent performance."
    difficulty: "easy"
    grader: "tasks.balanced_feed.grader:grade"

  - id: "high_risk_feed"
    name: "High Risk Feed"
    description: "A session with higher availability of risky content and spiral pressure. Tests safety-awareness."
    difficulty: "medium"
    grader: "tasks.high_risk_feed.grader:grade"

  - id: "low_diversity_feed"
    name: "Low Diversity Feed"
    description: "A session where repetitive content loops are more likely. Tests diversity-seeking behavior."
    difficulty: "hard"
    grader: "tasks.low_diversity_feed.grader:grade"
